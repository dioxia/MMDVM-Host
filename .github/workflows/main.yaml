#
# .github/workflows/main.yml
#

#
# .github/workflows/build.yml
#

name: Build MMDVM-Host

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux-amd64
            cc: gcc
            cxx: g++
            binary: MMDVM-Host-linux-amd64

          - arch: linux-arm64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            binary: MMDVM-Host-linux-arm64

          - arch: linux-armhf
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++
            binary: MMDVM-Host-linux-armhf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update apt
        run: sudo apt-get update

      - name: Add Mosquitto PPA
        run: |
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:mosquitto-dev/mosquitto-ppa
          sudo apt-get update

      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            build-essential \
            git \
            make \
            pkg-config \
            wget \
            libusb-1.0-0-dev \
            libasound2-dev \
            libssl-dev \
            libfftw3-dev \
            libi2c-dev \
            libmosquitto-dev \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            file

      - name: Download json.hpp
        run: |
          wget -q -O json.hpp \
            https://github.com/nlohmann/json/releases/download/v3.12.0/json.hpp

      - name: Verify json.hpp
        run: |
          test -f json.hpp
          ls -lh json.hpp

      - name: Clean previous build
        run: |
          make clean || true

      - name: Build
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          echo "Compiler:"
          $CXX --version

          make -j"$(nproc)"

      - name: Rename binary
        run: |
          mv MMDVM-Host "${{ matrix.binary }}"

      - name: Strip binary
        run: |
          strip "${{ matrix.binary }}" || true

      - name: Verify binary
        run: |
          file "${{ matrix.binary }}"
          ls -lh "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          compression-level: 8
